
# enable model auto update, the default is false
lgbm-auto-update: true
# model auto update interval, the default is 72 (hours)
lgbm-update-interval: 72
# model update url
lgbm-url: "https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model-middle.bin"

x-anchors:
  reserved_ips: &reserved_ips
    - 0.0.0.0/8
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/3

  dns_ru: &dns_ru
    - https://common.dot.dns.yandex.net
    - 77.88.8.1

  dns_proxy: &dns_proxy
    - https://1.1.1.1/dns-query
    - https://1.0.0.1/dns-query  # PROXY

  pr_http: &pr_http
    type: http
    interval: 86400

  rp_classical: &rp_classical
    <<: *pr_http
    behavior: classical
    format: yaml
    proxy: PROXY

  rp_domain: &rp_domain
    <<: *pr_http
    behavior: domain
    format: mrs
    proxy: PROXY

  rp_ipcidr: &rp_ipcidr
    <<: *pr_http
    behavior: ipcidr
    format: mrs
    proxy: PROXY

mixed-port: 7890
allow-lan: false
bind-address: "*"
tcp-concurrent: true
enable-process: true
find-process-mode: always
mode: rule
log-level: info
ipv6: true
keep-alive-interval: 30
unified-delay: true

profile:
  store-selected: true
  store-fake-ip: true
  smart-collector-size: 100
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
  skip-dst-address:
    - 0.0.0.0/8
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/3
    - ::/127
    - fc00::/7
    - fe80::/10
    - ff00::/8
