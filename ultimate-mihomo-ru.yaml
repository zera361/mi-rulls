rules:
  # --- Системные / приватные адреса ---
  - RULE-SET,private-ips,DIRECT,no-resolve         # приватные IP — всегда напрямую, без DNS
  - IP-CIDR,::/0,REJECT-DROP,no-resolve            # весь IPv6-трафик, не попавший в fake-ip — блок
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT-DROP # QUIC — принудительно через TCP
  - RULE-SET,private-domains,DIRECT                # локальные домены — напрямую

  # --- Блокировки ---
  - RULE-SET,category-ads,REJECT-DROP              # реклама
  - RULE-SET,win-spy,REJECT-DROP                   # телеметрия Windows
  
  # --- Торренты ---
  - RULE-SET,torrent-domains,DIRECT                # торрент-трекеры — напрямую
  
  - PROCESS-PATH,C:\Program Files\WindowsApps\36690Nohus.RIFTIntelFusionTool_5.18.4.0_x64__y193x6xbg7nmg\bin\RIFT Intel Fusion Tool.exe,DIRECT
  - PROCESS-NAME,exefile.exe,PROXY

  # --- Сервисы через PROXY ---
  - RULE-SET,google-play,PROXY
  - RULE-SET,twitch-ads,PROXY                      # домены Twitch Ads — через PROXY (фикс качества)
  
  # --- Сервисы в DIRECT ---
  - RULE-SET,twitch,DIRECT
  - RULE-SET,apple,DIRECT
 
  # --- DIRECT ---
  - RULE-SET,category-ru,DIRECT                    # RU-сайты, жесткая зависимость от whitelist
  - RULE-SET,whitelist,DIRECT                      # RU-белосписочный 
  
  # --- Торренты ---
  - RULE-SET,torrent-clients,DIRECT                # торрент-клиенты по процессу
  - RULE-SET,youtube,▶️ YouTube
    # ➤ Telegram
  - RULE-SET,telegram-ips,➤ Telegram
  - RULE-SET,telegram-domains,➤ Telegram
  - PROCESS-NAME-REGEX,(?i).*ayugram.*,➤ Telegram
  - PROCESS-NAME-REGEX,(?i).*telegram.*,➤ Telegram
    # 💬 Discord
  - AND,((RULE-SET,cloudflare-ips),(NETWORK,udp),(DST-PORT,19200-19500)),💬 Discord
  - AND,((RULE-SET,cloudflare-ips),(NETWORK,udp),(DST-PORT,50000-50100)),💬 Discord
  - AND,((RULE-SET,discord_voiceips),(NETWORK,udp),(DST-PORT,50000-50100)),💬 Discord
  - RULE-SET,discord_vc,💬 Discord
  - RULE-SET,discord_domains,💬 Discord
  - PROCESS-NAME-REGEX,(?i).*discord.*,💬 Discord
  - PROCESS-NAME-REGEX,(?i).*vesktop.*,💬 Discord
  - OR,((RULE-SET,whatsapp_domains),(RULE-SET,meta_ips)),PROXY 
  
  - RULE-SET,ru-app-list,DIRECT 
  

  # --- IP-адреса → DIRECT ---
  - RULE-SET,direct-ips,DIRECT
  
  # --- Всё остальное → PROXY ---
  - MATCH,PROXY 
