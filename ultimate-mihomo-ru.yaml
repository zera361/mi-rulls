proxy-groups:
  - name: 🛡️ VPN
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hijacking.png
    type: select
    exclude-filter: 🇷🇺 Rus-2
    proxies:
      - ⚡️ Авто
      # LEAVE THIS LINE!
    use:
      - subscription

  - name: ▶️ YouTube
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    type: select
    proxies:
      - 🛡️ VPN
    use:
      - subscription

  - name: ⚡️ Авто
    type: smart
    exclude-filter: 🇷🇺 Rus-2
    # uselightgbm: use LightGBM model predict weight
    uselightgbm: true
    # collectdata: collect datas for model training
    collectdata: false
    # strategy: 'sticky-sessions' or 'round-robin', not support 'consistent-hashing'
    # the default is 'sticky-sessions' with more stable&smoothly nodes switch logic when datas collecting
    strategy: sticky-sessions
    # sample-rate: data acquisition rate, desirable values are 0-1,  the default is 1
    sample-rate: 1
    use:
      - subscription

  - name: 💬 Discord
    icon: https://cdn.jsdelivr.net/gh/remnawave/templates@main/icons/Discord.png
    type: select
    proxies:
      - ⚡️ Авто
      - 🔓 Без VPN
    use:
      - subscription

  - name: ➤ Telegram
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png
    type: select
    proxies:
      - ⚡️ Авто
      - 🔓 Без VPN
    use:
      - subscription

  - name: RU сайты
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Direct.png
    remnawave:
      include-proxies: false
    type: select
    hidden: true
    proxies:
