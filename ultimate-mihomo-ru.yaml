  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: true
  route-exclude-address: *reserved_ips

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  cache-algorithm: arc
  prefer-h3: false
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - rule-set:private-domains # исключить из fake-ip приватные домены
    - "+.lan"
    - "+.local"
    - "+.msftncsi.com"
    - "+.msftconnecttest.com"
  default-nameserver: 
    - 77.88.8.1
  proxy-server-nameserver: *dns_ru
  direct-nameserver: *dns_ru
  nameserver: *dns_proxy # PROXY
  nameserver-policy:
    rule-set:private-domains:
      - system

    "rule-set:youtube,telegram,discord_domains,whatsapp_domains": *dns_proxy
proxy-providers:
  subscription:
    type: inline
    path: ./proxy_providers/subscription.yaml
    health-check:
      enable: true
      lazy: true
      interval: 600
