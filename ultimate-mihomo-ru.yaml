    type: select
    hidden: true
    remnawave:
      include-proxies: false
    proxies:
      - 🛡️ VPN
  - name: 🔓 Без VPN
    type: select
    hidden: true
    remnawave:
      include-proxies: false
    proxies:
      - DIRECT
  - name: ⛔ Блок
    type: select
    hidden: true
    remnawave:
      include-proxies: false
    proxies:
      - REJECT
  - name: ⏭️ Пропуск
    type: select
    hidden: true
    remnawave:
      include-proxies: false
    proxies:
      - PASS
